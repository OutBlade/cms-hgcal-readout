name: Release binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

jobs:
  build:
    name: Build — ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            artifact: hgcal-lab-windows-x64.exe

          - os: ubuntu-22.04
            label: linux-x64
            artifact: hgcal-lab-linux-x64

          - os: windows-11-arm
            label: windows-arm64
            artifact: hgcal-lab-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install customtkinter matplotlib numpy scipy pillow pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller app/hgcal_lab.spec

      # Rename the output to the platform-specific artifact name
      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist\hgcal-lab.exe dist\${{ matrix.artifact }}

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/hgcal-lab dist/${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          gh release create "$TAG" \
            --title "HGCAL Lab $TAG" \
            --notes "$(cat <<'EOF'
          ## HGCAL Lab $TAG

          Standalone desktop application for CMS HGCAL prototype readout analysis.
          No Python installation required — just download and run.

          | Platform | File |
          |---|---|
          | Windows x64 | hgcal-lab-windows-x64.exe |
          | Windows ARM64 | hgcal-lab-windows-arm64.exe |
          | Linux x64 | hgcal-lab-linux-x64 |

          **Linux:** `chmod +x hgcal-lab-linux-x64 && ./hgcal-lab-linux-x64`

          ### What's included
          - Dashboard with live frame counter and event log
          - ECON-D frame decoder (binary file or demo data)
          - HGCROC noise analysis (S-curve fits, ENC, pedestal)
          - Hexagonal wafer occupancy map
          - lpGBT bandwidth budget calculator
          EOF
          )" \
            dist/hgcal-lab-windows-x64.exe/hgcal-lab-windows-x64.exe \
            dist/hgcal-lab-linux-x64/hgcal-lab-linux-x64 \
            dist/hgcal-lab-windows-arm64.exe/hgcal-lab-windows-arm64.exe \
            2>/dev/null || \
          gh release create "$TAG" \
            --title "HGCAL Lab $TAG" \
            --notes "Standalone binaries — see README for details." \
            dist/hgcal-lab-windows-x64.exe/hgcal-lab-windows-x64.exe \
            dist/hgcal-lab-linux-x64/hgcal-lab-linux-x64 \
            2>/dev/null || true
